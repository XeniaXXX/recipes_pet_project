<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Recipee | Recipes</title>
    <link rel="stylesheet" href="styles/main.css" />
    <script src="scripts/pages/recipes.js" type="module" defer></script>
  </head>
  <body>
    <header class="header">
      <div class="header__inner container">
        <a href="./index.html" class="header__logo logo">
          <img
            class="logo__image"
            src="icons/logo.svg"
            alt="Recipee logo image"
            width="50"
            height="50"
          />
          Recipee
        </a>
        <form class="header__search-wrapper">
          <label class="header__search-field">
            <svg
              class="icon header__search-icon"
              xmlns="http://www.w3.org/2000/svg"
              xml:space="preserve"
              viewBox="0 0 32 32"
            >
              <path
                d="m27.4 24.6-5-5a10 10 0 1 0-2.8 2.8l5 5a2 2 0 1 0 2.8-2.8M7 14a7 7 0 1 1 14 0 7 7 0 0 1-14 0"
              />
            </svg>
            <input
              type="text"
              class="header__search-input"
              placeholder="Search recipes..."
            />
          </label>
          <a href="#" class="header__search-user user">
            <img
              class="user__icon"
              src="images/person_image.png"
              alt="user image"
              width="50"
              height="50"
            />
          </a>
        </form>
      </div>
    </header>

    <main class="main">
      <div class="main__inner container">
        <h1 class="visually-hidden">Filters page</h1>
        <aside class="filters">
          <form class="filters__form">
            <header class="filters-top">
              <h2 class="filters-top__title h4">
                <svg
                  class="icon filters-top__icon"
                  xmlns="http://www.w3.org/2000/svg"
                  viewBox="0 0 32 32"
                >
                  <g data-name="Layer 2">
                    <path
                      d="M28 9H11a1 1 0 0 1 0-2h17a1 1 0 0 1 0 2M7 9H4a1 1 0 0 1 0-2h3a1 1 0 0 1 0 2M21 17H4a1 1 0 0 1 0-2h17a1 1 0 0 1 0 2M11 25H4a1 1 0 0 1 0-2h7a1 1 0 0 1 0 2"
                    />
                    <path
                      d="M9 11a3 3 0 1 1 3-3 3 3 0 0 1-3 3m0-4a1 1 0 1 0 1 1 1 1 0 0 0-1-1M23 19a3 3 0 1 1 3-3 3 3 0 0 1-3 3m0-4a1 1 0 1 0 1 1 1 1 0 0 0-1-1M13 27a3 3 0 1 1 3-3 3 3 0 0 1-3 3m0-4a1 1 0 1 0 1 1 1 1 0 0 0-1-1"
                    />
                    <path
                      d="M28 17h-3a1 1 0 0 1 0-2h3a1 1 0 0 1 0 2M28 25H15a1 1 0 0 1 0-2h13a1 1 0 0 1 0 2"
                    />
                  </g>
                  <path d="M0 0h32v32H0z" style="fill: none" />
                </svg>
                Filters
              </h2>
              <button class="filters-top__clear-btn">Clear all</button>
            </header>

            <div class="filters-group">
              <h3 class="filters-group__title h4">Cuisine</h3>
              <ul class="filters-list">
                <li class="filters-list__item">
                  <label class="filters-list__label">
                    <input
                      class="filters-list__input"
                      type="checkbox"
                      name="cuisine"
                      value="american"
                    />
                    American
                  </label>
                </li>
                <li class="filters-list__item">
                  <label class="filters-list__label">
                    <input
                      class="filters-list__input"
                      type="checkbox"
                      name="cuisine"
                      value="italian"
                    />
                    Italian
                  </label>
                </li>
                <li class="filters-list__item">
                  <label class="filters-list__label">
                    <input
                      class="filters-list__input"
                      type="checkbox"
                      name="cuisine"
                      value="asian"
                    />
                    Asian
                  </label>
                </li>
                <li class="filters-list__item">
                  <label class="filters-list__label">
                    <input
                      class="filters-list__input"
                      type="checkbox"
                      name="cuisine"
                      value="mexican"
                    />
                    Mexican
                  </label>
                </li>
                <li class="filters-list__item">
                  <label class="filters-list__label">
                    <input
                      class="filters-list__input"
                      type="checkbox"
                      name="cuisine"
                      value="mediterranean"
                    />
                    Mediterranean
                  </label>
                </li>
              </ul>
            </div>

            <div class="filters-group">
              <h3 class="filters-group__title">Main Ingredient</h3>
              <ul class="filters-list">
                <li class="filters-list__item">
                  <label class="filters-list__label">
                    <input
                      class="filters-list__input"
                      type="checkbox"
                      name="ingredient"
                      value="chicken"
                    />
                    Chicken
                  </label>
                </li>
                <li class="filters-list__item">
                  <label class="filters-list__label">
                    <input
                      class="filters-list__input"
                      type="checkbox"
                      name="ingredient"
                      value="beef"
                    />
                    Beef
                  </label>
                </li>
                <li class="filters-list__item">
                  <label class="filters-list__label">
                    <input
                      class="filters-list__input"
                      type="checkbox"
                      name="ingredient"
                      value="vegetables"
                    />
                    Vegetables
                  </label>
                </li>
                <li class="filters-list__item">
                  <label class="filters-list__label">
                    <input
                      class="filters-list__input"
                      type="checkbox"
                      name="ingredient"
                      value="rice&grains"
                    />
                    Rice & Grains
                  </label>
                </li>
                <li class="filters-list__item">
                  <label class="filters-list__label">
                    <input
                      class="filters-list__input"
                      type="checkbox"
                      name="ingredient"
                      value="seafood"
                    />
                    Seafood
                  </label>
                </li>
              </ul>
            </div>

            <div class="filters-group filters-group__range">
              <h3 class="filters-group__title">Cooking Time</h3>
              <p class="filters-group__subtitle filters-group__subtitle--time">
                0 - 60 min
              </p>
              <input
                class="filters-group__range-input"
                type="range"
                name="maxTime"
                min="0"
                max="60"
                value="0"
                step="5"
                data-unit="min"
              />
            </div>

            <div class="filters-group filters-group__range">
              <h3 class="filters-group__title">Calories</h3>
              <p
                class="filters-group__subtitle filters-group__subtitle--calories"
              >
                0 - 800 kcal
              </p>
              <input
                class="filters-group__range-input"
                type="range"
                name="maxCalories"
                min="0"
                max="800"
                value="0"
                step="50"
                data-unit="kcal"
              />
            </div>
          </form>
        </aside>

        <section class="all-recipes">
          <div class="all-recipes__top">
            <div class="all-recipes__left">
              <h2 class="recipes__title">
                All <span class="title--accent">Recipes</span>
              </h2>
              <div class="recipes__amount">
                <p class="recipes__amount--skeleton skeleton"></p>
              </div>
            </div>
          </div>
          <div class="all-recipes__all">
            <a class="recipe-card">
              <div
                class="recipe-card__image-wrapper recipe-card__image-wrapper--skeleton skeleton"
              ></div>
              <div class="recipe-card__info">
                <p class="recipe-card__info-text skeleton"></p>
                <p class="recipe-card__info-text skeleton"></p>
                <p class="recipe-card__info-text skeleton"></p>
                <p class="recipe-card__info-text skeleton"></p>
              </div>
            </a>
            <a class="recipe-card">
              <div
                class="recipe-card__image-wrapper recipe-card__image-wrapper--skeleton skeleton"
              ></div>
              <div class="recipe-card__info">
                <p class="recipe-card__info-text skeleton"></p>
                <p class="recipe-card__info-text skeleton"></p>
                <p class="recipe-card__info-text skeleton"></p>
                <p class="recipe-card__info-text skeleton"></p>
              </div>
            </a>
            <a class="recipe-card">
              <div
                class="recipe-card__image-wrapper recipe-card__image-wrapper--skeleton skeleton"
              ></div>
              <div class="recipe-card__info">
                <p class="recipe-card__info-text skeleton"></p>
                <p class="recipe-card__info-text skeleton"></p>
                <p class="recipe-card__info-text skeleton"></p>
                <p class="recipe-card__info-text skeleton"></p>
              </div>
            </a>
            <a class="recipe-card">
              <div
                class="recipe-card__image-wrapper recipe-card__image-wrapper--skeleton skeleton"
              ></div>
              <div class="recipe-card__info">
                <p class="recipe-card__info-text skeleton"></p>
                <p class="recipe-card__info-text skeleton"></p>
                <p class="recipe-card__info-text skeleton"></p>
                <p class="recipe-card__info-text skeleton"></p>
              </div>
            </a>
            <a class="recipe-card">
              <div
                class="recipe-card__image-wrapper recipe-card__image-wrapper--skeleton skeleton"
              ></div>
              <div class="recipe-card__info">
                <p class="recipe-card__info-text skeleton"></p>
                <p class="recipe-card__info-text skeleton"></p>
                <p class="recipe-card__info-text skeleton"></p>
                <p class="recipe-card__info-text skeleton"></p>
              </div>
            </a>
            <a class="recipe-card">
              <div
                class="recipe-card__image-wrapper recipe-card__image-wrapper--skeleton skeleton"
              ></div>
              <div class="recipe-card__info">
                <p class="recipe-card__info-text skeleton"></p>
                <p class="recipe-card__info-text skeleton"></p>
                <p class="recipe-card__info-text skeleton"></p>
                <p class="recipe-card__info-text skeleton"></p>
              </div>
            </a>
          </div>
        </section>
      </div>
    </main>
  </body>
</html>
