<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Recipee | Home</title>
    <link rel="stylesheet" href="styles/main.css" />
    <script src="scripts/pages/home.js" type="module" defer></script>
  </head>

  <body>
    <header class="header">
      <div class="header__inner container">
        <a href="#" class="header__logo logo">
          <img
            class="logo__image"
            src="icons/logo.svg"
            alt="Recipee logo image"
            width="50"
            height="50"
          />
          Recipee
        </a>
        <nav class="header__menu">
          <ul class="header__menu-list">
            <li class="header__menu-item">
              <a href="#" class="header__menu-link">Home</a>
            </li>
            <li class="header__menu-item">
              <a href="./recipes.html" class="header__menu-link">Recipes</a>
            </li>
            <li class="header__menu-item">
              <a href="#" class="header__menu-link">Categories</a>
            </li>
            <li class="header__menu-item">
              <a href="#" class="header__menu-link">About</a>
            </li>
            <li class="header__menu-item">
              <a href="#" class="header__menu-link">Contact</a>
            </li>
          </ul>
        </nav>
        <form class="header__search-wrapper">
          <label class="header__search-field">
            <svg
              class="icon header__search-icon"
              xmlns="http://www.w3.org/2000/svg"
              xml:space="preserve"
              viewBox="0 0 32 32"
            >
              <path
                d="m27.4 24.6-5-5a10 10 0 1 0-2.8 2.8l5 5a2 2 0 1 0 2.8-2.8M7 14a7 7 0 1 1 14 0 7 7 0 0 1-14 0"
              />
            </svg>
            <input
              type="text"
              class="header__search-input"
              placeholder="Search recipes..."
            />
          </label>
          <a href="#" class="header__search-user user">
            <img
              class="user__icon"
              src="images/person_image.png"
              alt="user image"
              width="50"
              height="50"
            />
          </a>
        </form>
      </div>
    </header>

    <main>
      <section class="hero">
        <div class="hero__inner container">
          <div class="hero__body">
            <div class="hero__body-info">
              <h1 class="hero__title title h1">
                Discover <br />
                <span class="hero__title-accent title--accent">Delicious</span>
                Recipes
              </h1>
              <div class="hero__subtitle">
                <p>Find easy and tasty recipes for every occasion.</p>
              </div>
            </div>
            <form class="hero__body-search">
              <label class="hero__body-search__label">
                <svg
                  class="icon hero__body-search__icon"
                  xmlns="http://www.w3.org/2000/svg"
                  xml:space="preserve"
                  viewBox="0 0 32 32"
                >
                  <path
                    d="m27.4 24.6-5-5a10 10 0 1 0-2.8 2.8l5 5a2 2 0 1 0 2.8-2.8M7 14a7 7 0 1 1 14 0 7 7 0 0 1-14 0"
                  />
                </svg>
                <input
                  type="text"
                  class="hero__body-search__input search-input"
                  placeholder="Search recipes, ingredients..."
                />
              </label>
              <button class="hero__body-search__button" type="submit">
                Search
              </button>
            </form>
            <div class="hero__body-ingredient">
              <p class="hero__body-ingredient__title">Popular:</p>
              <a href="#" class="ingredient ingredient--skeleton skeleton"></a>
              <a href="#" class="ingredient ingredient--skeleton skeleton"></a>
              <a href="#" class="ingredient ingredient--skeleton skeleton"></a>
              <a href="#" class="ingredient ingredient--skeleton skeleton"></a>
              <a href="#" class="ingredient ingredient--skeleton skeleton"></a>
              <a href="#" class="ingredient ingredient--skeleton skeleton"></a>
              <a href="#" class="ingredient ingredient--skeleton skeleton"></a>
            </div>
          </div>
          <div class="hero__extra">
            <img
              src="images/food-hero.jpg"
              alt=""
              class="hero__extra-image"
              width="650"
              height="550"
            />
          </div>
        </div>
      </section>

      <section class="cuisines">
        <div class="cuisines__inner container">
          <div class="section__top">
            <h2 class="section__title title">
              Popular <span class="title--accent">Categories</span>
            </h2>
            <a href="./recipes.html" class="section__link">View all ></a>
          </div>
          <div class="cuisines__cards">
            <a href="#" class="cuisines__card">
              <figure class="cuisines__card-image-wrapper skeleton"></figure>
              <h3
                class="cuisines__card-title cuisines__card-title--skeleton skeleton"
              ></h3>
              <p
                class="cuisines__card-recipes cuisines__card-recipes--skeleton skeleton"
              ></p>
            </a>
            <a href="#" class="cuisines__card">
              <figure class="cuisines__card-image-wrapper skeleton"></figure>
              <h3
                class="cuisines__card-title cuisines__card-title--skeleton skeleton"
              ></h3>
              <p
                class="cuisines__card-recipes cuisines__card-recipes--skeleton skeleton"
              ></p>
            </a>
            <a href="#" class="cuisines__card">
              <figure class="cuisines__card-image-wrapper skeleton"></figure>
              <h3
                class="cuisines__card-title cuisines__card-title--skeleton skeleton"
              ></h3>
              <p
                class="cuisines__card-recipes cuisines__card-recipes--skeleton skeleton"
              ></p>
            </a>
            <a href="#" class="cuisines__card">
              <figure class="cuisines__card-image-wrapper skeleton"></figure>
              <h3
                class="cuisines__card-title cuisines__card-title--skeleton skeleton"
              ></h3>
              <p
                class="cuisines__card-recipes cuisines__card-recipes--skeleton skeleton"
              ></p>
            </a>
            <!-- <a href="#" class="cuisines__card">
              <figure class="cuisines__card-image-wrapper">
                <img
                  src="images/italian-cuisine.jpg"
                  alt="picture describing type of cuisine"
                  class="cuisines__card-image"
                  width="200"
                  height="200"
                />
              </figure>
              <h3 class="cuisines__card-title">Italian</h3>
              <div class="cuisines__card-recipes">
                <span class="cuisines__card-num">92</span>
                <p>recipes</p>
              </div>
            </a> -->
          </div>
        </div>
      </section>

      <section class="recipes">
        <div class="recipes__inner container">
          <div class="section__top">
            <h2 class="section__title title">
              Popular <span class="title--accent">Recipes</span>
            </h2>
            <a href="./recipes.html" class="section__link">View all ></a>
          </div>
          <div class="recipes__cards">
            <a class="recipe-card">
              <div
                class="recipe-card__image-wrapper recipe-card__image-wrapper--skeleton skeleton"
              ></div>
              <div class="recipe-card__info">
                <p class="recipe-card__info-text skeleton"></p>
                <p class="recipe-card__info-text skeleton"></p>
                <p class="recipe-card__info-text skeleton"></p>
                <p class="recipe-card__info-text skeleton"></p>
              </div>
            </a>
            <a class="recipe-card">
              <div
                class="recipe-card__image-wrapper recipe-card__image-wrapper--skeleton skeleton"
              ></div>
              <div class="recipe-card__info">
                <p class="recipe-card__info-text skeleton"></p>
                <p class="recipe-card__info-text skeleton"></p>
                <p class="recipe-card__info-text skeleton"></p>
                <p class="recipe-card__info-text skeleton"></p>
              </div>
            </a>
            <a class="recipe-card">
              <div
                class="recipe-card__image-wrapper recipe-card__image-wrapper--skeleton skeleton"
              ></div>
              <div class="recipe-card__info">
                <p class="recipe-card__info-text skeleton"></p>
                <p class="recipe-card__info-text skeleton"></p>
                <p class="recipe-card__info-text skeleton"></p>
                <p class="recipe-card__info-text skeleton"></p>
              </div>
            </a>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
